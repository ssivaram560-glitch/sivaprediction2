<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVA ULTRA AI - Sureshot V54</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #00ff88;
            --neon-red: #ff3131;
            --bg: #020617;
            --card: #0f172a;
        }

        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #1e293b; box-shadow: 0 0 40px rgba(0, 243, 255, 0.15); text-align: center; }
        .header h1 { font-size: 1.4rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        .period-box { margin: 20px 0; }
        #period-num { font-weight: bold; color: #94a3b8; font-size: 1.1rem; }

        .circle-area { width: 180px; height: 180px; border: 4px solid var(--neon-blue); border-radius: 50%; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; }
        .pred-text { font-size: 2rem; font-weight: 800; }
        .level-badge { background: #fbbf24; color: black; padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }

        .strike-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .strike-card { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; border-left: 4px solid var(--neon-blue); }
        .strike-val { font-size: 1.3rem; font-weight: bold; display: block; color: var(--neon-blue); }
        .strike-lab { font-size: 0.65rem; color: #64748b; }

        .history-box { margin-top: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; height: 150px; overflow-y: auto; padding: 10px; font-size: 0.8rem; text-align: left; border: 1px solid #1e293b; }
        .log-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SIVA ULTRA AI</h1>
        <span style="font-size: 0.6rem; color: var(--neon-green);">LIVE SERVER SYNC ACTIVE</span>
    </div>

    <div class="period-box">
        <div id="period-num">CONNECTING...</div>
        <div id="timer" style="color:white; font-size: 1.2rem; margin-top: 5px;">00s</div>
    </div>

    <div class="circle-area" id="glow-circle">
        <div class="pred-text" id="prediction-text">---</div>
        <div class="level-badge" id="level-tag">LEVEL 1</div>
    </div>

    <div class="strike-grid">
        <div class="strike-card"><span class="strike-val" id="win-strike">0</span><span class="strike-lab">Win Strike</span></div>
        <div class="strike-card" style="border-left-color: var(--neon-red);"><span class="strike-val" id="loss-strike">0</span><span class="strike-lab">Loss Strike</span></div>
        <div class="strike-card"><span class="strike-val" id="total-win">0</span><span class="strike-lab">Total Win</span></div>
        <div class="strike-card" style="border-left-color: var(--neon-red);"><span class="strike-val" id="total-loss">0</span><span class="strike-lab">Total Loss</span></div>
    </div>

    <div class="history-box" id="history-log">History Loading...</div>
</div>

<script>
let stats = JSON.parse(localStorage.getItem("siva_stats")) || { win:0, loss:0, ws:0, ls:0, level:1 };
let lastCheckedPeriod = null;

// 🔥 SERVER SYNC
async function syncServer() {
    try {
        const res = await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?t=" + Date.now());
        const data = await res.json();
        const latest = data.data.list[0];
        
        const currentPeriod = latest.issueNumber;
        const nextPeriod = (BigInt(currentPeriod) + 1n).toString();
        
        document.getElementById("period-num").innerText = "PERIOD: " + nextPeriod;
        
        // Timer Logic based on real seconds
        let seconds = 60 - new Date().getSeconds();
        document.getElementById("timer").innerText = seconds + "s";

        // Check result of previous period
        if (lastCheckedPeriod && lastCheckedPeriod !== currentPeriod) {
            validateResult(latest);
        }
        
        lastCheckedPeriod = currentPeriod;
        generatePrediction(nextPeriod, data.data.list);
        updateUI();

    } catch (e) {
        document.getElementById("period-num").innerText = "SERVER SYNC ERROR";
    }
}

// 🧠 SURESHOT LOGIC (3-LEVEL)
function generatePrediction(nextPeriod, list) {
    // Pattern Analysis
    let last5 = list.slice(0, 5).map(item => parseInt(item.number));
    let bigCount = last5.filter(n => n >= 5).length;
    let smallCount = last5.length - bigCount;
    
    let pred = "";
    // Strategy: Follow the trend for Sureshot
    if (bigCount >= 3) pred = "BIG";
    else if (smallCount >= 3) pred = "SMALL";
    else pred = (last5[0] >= 5) ? "SMALL" : "BIG"; // Trend reversal

    // 3-Level Level adjustment in Text
    let displayPred = pred;
    if(stats.level === 2) displayPred = pred + " 🔥";
    if(stats.level === 3) displayPred = pred + " 💎";

    document.getElementById("prediction-text").innerText = displayPred;
    
    const circle = document.getElementById("glow-circle");
    if(pred === "BIG") {
        circle.style.borderColor = "var(--neon-green)";
        document.getElementById("prediction-text").style.color = "var(--neon-green)";
    } else {
        circle.style.borderColor = "var(--neon-red)";
        document.getElementById("prediction-text").style.color = "var(--neon-red)";
    }
    
    localStorage.setItem("current_pred", pred);
    localStorage.setItem("current_period", nextPeriod);
}

// ✅ VALIDATE RESULT
function validateResult(latestResult) {
    const actualNum = parseInt(latestResult.number);
    const actualSize = actualNum >= 5 ? "BIG" : "SMALL";
    const savedPred = localStorage.getItem("current_pred");
    const savedPeriod = localStorage.getItem("current_period");

    if (savedPeriod === latestResult.issueNumber) {
        if (savedPred === actualSize) {
            stats.win++;
            stats.ws++;
            stats.ls = 0;
            stats.level = 1; // Reset to level 1 on win
        } else {
            stats.loss++;
            stats.ls++;
            stats.ws = 0;
            if (stats.level < 3) stats.level++; // Max 3 Levels
            else stats.level = 1; // Reset after Level 3
        }
        localStorage.setItem("siva_stats", JSON.stringify(stats));
        updateHistory(latestResult.issueNumber, actualSize, savedPred === actualSize);
    }
}

function updateUI() {
    document.getElementById("win-strike").innerText = stats.ws;
    document.getElementById("loss-strike").innerText = stats.ls;
    document.getElementById("total-win").innerText = stats.win;
    document.getElementById("total-loss").innerText = stats.loss;
    document.getElementById("level-tag").innerText = "LEVEL " + stats.level;
}

function updateHistory(period, res, isWin) {
    const log = document.getElementById("history-log");
    if(log.innerText.includes("Loading")) log.innerHTML = "";
    
    const div = document.createElement("div");
    div.className = "log-item";
    div.innerHTML = `<span>#${period.slice(-3)}: ${res}</span> <span style="color:${isWin?'var(--neon-green)':'var(--neon-red)'}">${isWin?'WIN':'LOSS'}</span>`;
    log.prepend(div);
}

setInterval(syncServer, 3000);
window.onload = syncServer;
</script>
</body>
</html>
