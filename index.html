<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVA ULTRA AI - Sureshot V53</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #00ff88;
            --neon-red: #ff3131;
            --bg: #020617;
            --card: #0f172a;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: 25px;
            padding: 20px;
            border: 1px solid #1e293b;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
        }

        .header { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .header h1 { font-size: 1.4rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin: 0; }
        
        /* Period Area */
        .period-box { text-align: center; margin: 20px 0; }
        #period-num { font-weight: bold; color: #94a3b8; letter-spacing: 2px; }

        /* Prediction Circle */
        .circle-area {
            position: relative;
            width: 180px;
            height: 180px;
            border: 4px solid var(--neon-blue);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.4s;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .pred-text { font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; }
        .level-badge {
            background: #fbbf24;
            color: black;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Strike Stats */
        .strike-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .strike-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid var(--neon-blue);
        }
        .strike-card.loss-card { border-left-color: var(--neon-red); }
        .strike-val { font-size: 1.3rem; font-weight: bold; display: block; }
        .strike-lab { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }

        /* Buttons */
        .btn-main {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #0ea5e9, #2dd4bf);
            border: none;
            border-radius: 12px;
            color: black;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .history-box {
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            height: 180px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.8rem;
            border: 1px solid #1e293b;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #1e293b;
        }
        
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SIVA ULTRA AI</h1>
        <span style="font-size: 0.6rem; color: var(--neon-green);">FAST-SYNC ENGINE V53</span>
    </div>

    <div class="period-box">
        <div id="period-num">FETCHING LIVE PERIOD...</div>
        <div id="sync-status" style="font-size: 0.6rem; color: #64748b;">Server Status: Connecting...</div>
    </div>

    <div class="circle-area" id="glow-circle">
        <div id="timer" style="margin-top:10px;font-size:14px;color:white;">60s</div>
        <div class="pred-text" id="prediction">---</div>
        <div class="level-badge" id="level-tag">LEVEL 1</div>
    </div>

    <div class="strike-grid">
        <div class="strike-card">
            <span class="strike-val" id="win-strike">0</span>
            <span class="strike-lab">Win Strike</span>
        </div>
        <div class="strike-card loss-card">
            <span class="strike-val" id="loss-strike">0</span>
            <span class="strike-lab">Loss Strike</span>
        </div>
        <div class="strike-card">
            <span class="strike-val" id="total-win">0</span>
            <span class="strike-lab">Total Win</span>
        </div>
        <div class="strike-card loss-card">
            <span class="strike-val" id="total-loss">0</span>
            <span class="strike-lab">Total Loss</span>
        </div>
    </div>

    <button class="btn-main" onclick="getSureshotPrediction()">GET SURESHOT SIGNAL</button>

    <div class="history-box" id="history-log">
        <div style="color: #94a3b8; text-align: center; margin-top: 70px;">Waiting for first signal...</div>
    </div>
</div>

<script>

let stats = JSON.parse(localStorage.getItem("stats")) || {
    win:0, loss:0, ws:0, ls:0, level:1
};

let lastPeriod = localStorage.getItem("period");
let currentPrediction = null;

let seconds = 60;

// TIMER AUTO START
setInterval(()=>{
    seconds--;
    if(seconds<0) seconds=59;
    document.getElementById("timer").innerText=seconds+"s";
},1000);

// SERVER
async function sync(){

    try{
        let res = await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?t="+Date.now());
        let data = await res.json();

        let latest = data.data.list[0];
        let period = latest.issueNumber;
        let num = parseInt(latest.number);

        if(!lastPeriod){
            lastPeriod=period;
            localStorage.setItem("period",period);

            seconds = 59 - new Date().getSeconds();
            generate(period);
            return;
        }

        if(period !== lastPeriod){
            check(num,lastPeriod);

            lastPeriod=period;
            localStorage.setItem("period",period);

            seconds=60;
            generate(period);
        }

        document.getElementById("period-num").innerText="PERIOD: "+(parseInt(period)+1);

    }catch(e){
        document.getElementById("sync-status").innerText="Server ERROR";
    }
}

// PREDICTION
function generate(period){

    let saved = localStorage.getItem("pred_"+period);
    if(saved){
        currentPrediction=saved;
        show(saved);
        return;
    }

    let history = JSON.parse(localStorage.getItem("last10"))||[];

    let last = history[0] || "BIG";
let last2 = history.slice(0,2);
let last3 = history.slice(0,3);
    let result;

    // 🔥 LEVEL 1 (TREND + BREAK)
    if(stats.level==1){

        if(last3.every(x=>x.includes("BIG"))) result="SMALL GREEN";
        else if(last3.every(x=>x.includes("SMALL"))) result="BIG RED";
        else{
            result = last.includes("BIG") ? "SMALL RED" : "BIG GREEN";
        }
    }

    // 🔥 LEVEL 2 (STRONG REVERSE)
    else if(stats.level==2){

        if(last.includes("BIG")) result="SMALL GREEN";
        else result="BIG RED";
    }

    // 🔥 LEVEL 3 (SAFE RANDOM CONTROL)
    else{

        let options = ["BIG RED","BIG GREEN","SMALL RED","SMALL GREEN"];

        // avoid same repeat
        result = options.filter(x=>x!==last)[Math.floor(Math.random()*3)];
    }

    currentPrediction=result;

    localStorage.setItem("pred_"+period,result);

    show(result);
}
// SHOW
function show(res){

    let circle=document.getElementById("glow-circle");
    let pred=document.getElementById("prediction");

    pred.innerText=res;

    if(res.includes("BIG")){
    circle.style.borderColor="var(--neon-green)";
    pred.style.color="var(--neon-green)";
}else{
    circle.style.borderColor="var(--neon-red)";
    pred.style.color="var(--neon-red)";
}

    document.getElementById("level-tag").innerText="LEVEL "+stats.level;
}

// CHECK RESULT
function check(num,period){

    let pred = localStorage.getItem("pred_"+period);
    if(!pred) return;

    let actualSize = num>=5?"BIG":"SMALL";
let actualColor = num%2==0?"RED":"GREEN";

let win = pred.includes(actualSize) || pred.includes(actualColor);

    if(win){
        stats.win++;
        stats.ws++;
        stats.ls=0;
        stats.level=1;
    }else{
        stats.loss++;
        stats.ls++;
        stats.ws=0;
        if(stats.level<3) stats.level++;
    }

    localStorage.setItem("stats",JSON.stringify(stats));

    update();
    saveHistory(num);
    addHistory(period,num,pred,win);
}

// UPDATE
function update(){
    document.getElementById("win-strike").innerText=stats.ws;
    document.getElementById("loss-strike").innerText=stats.ls;
    document.getElementById("total-win").innerText=stats.win;
    document.getElementById("total-loss").innerText=stats.loss;
}

// SAVE HISTORY
function saveHistory(num){

    let size = num>=5?"BIG":"SMALL";
    let color = num%2==0?"RED":"GREEN";

    let val = size+" "+color;

    let h = JSON.parse(localStorage.getItem("last10"))||[];
    h.unshift(val);
    if(h.length>10) h.pop();

    localStorage.setItem("last10",JSON.stringify(h));
}
// HISTORY UI
function addHistory(p,n,pr,w){
    let box=document.getElementById("history-log");

    let div=document.createElement("div");
    div.className="log-item";

    div.innerHTML = `
        <span>${p} → ${pr} → ${n}</span>
        <span style="color:${w?"lime":"red"}">${w?"WIN":"LOSS"}</span>
    `;

    box.prepend(div);
}

// BUTTON FIX
function getSureshotPrediction(){
    generate(lastPeriod);
}

// LOOP
setInterval(sync,4000);

window.onload=()=>{
    update();
    sync();
};

</script>
</body>
</html>
